 <!DOCTYPE html>
<html lang="en">
  
  <head>
    <title>
      Entry Point cast at Twitter
    </title>
    <link
    rel="stylesheet"
    href="twitter-immitation.css">
  </head>

  <body>

    <!--Add post part-->
    <div class="twitter-add-post-part">
      <div class="searchbar">
        <input
        class="searchbar-input"
        type="text"
        placeholder="What's happening?">
      </div>
    </div>

    <!--Posts Part-->
    <div class="twitter-posts">
      <div class="twitter-posts-left">
        <div class="twitter-posts-left-pfp">
          <img class="twitter-pfp"
          src="image-posts/ryan.png"
          alt="Ryan Ross Profile Picture">
        </div>
      </div>

      <div class="twitter-posts-right">
        <div class="twitter-posts-top">
          <div class="twitter-posts-top-line1">
            <p class="twitter-text">
              <span class="twitter-username">
                Ryan
              </span>

              <span class="twitter-handle">
                @ryanross
              </span>

              <span class="twitter-timestamp">
                &middot; 1h
              </span>
            </p>
          </div>

          <div class="twitter-posts-top-line2">
            <p class="twitter-text">
              <span class="twitter-content">
                What the hell is a pineapple?
              </span>
            </p>
          </div>

          <div class="twitter-posts-top-line3">
            <img class="twitter-post-image"
              src="image-posts/Ryan-with-pinapple.png"
              alt="Pineapple Image">
          </div>
        </div>

        <div class="twitter-posts-bottom">
          <div class="twitter-posts-bottom-line">
            <div class="twitter-posts-bottom-line-part1">
              <div class="twitter-posts-bottom-line-comments">
                <div class="twitter-posts-bottom-line-icon">
                  <img class="twitter-posts-bottom-line-icon-image"
                  src="image-posts/Twitter_Comment.png"
                  alt="Comment Icon">
                </div>

                <div class="twitter-posts-bottom-line-number">
                  <p class="twitter-text">
                    <span class="twitter-icon-number">
                      3
                    </span>
                  </p>
                </div>
              </div>

              <div class="twitter-posts-bottom-line-repost">
                <div class="twitter-posts-bottom-line-icon">
                  <img class="twitter-posts-bottom-line-icon-image"
                  src="image-posts/Twitter_Repost.png"
                  alt="Repost Icon">
                </div>

                <div class="twitter-posts-bottom-line-number">
                  <p class="twitter-text">
                    <span class="twitter-icon-number">
                      24
                    </span>
                  </p>
                </div>                
              </div>

              <div class="twitter-posts-bottom-line-likes">
                <div class="twitter-posts-bottom-line-icon">
                  <img class="twitter-posts-bottom-line-icon-image"
                  src="image-posts/Twitter_Like.png"
                  alt="Like Icon">
                </div>

                <div class="twitter-posts-bottom-line-number">
                  <p class="twitter-text">
                    <span class="twitter-icon-number">
                      114
                    </span>
                  </p>
                </div>
              </div>

              <div class="twitter-posts-bottom-line-views">
                <div class="twitter-posts-bottom-line-icon">
                  <img class="twitter-posts-bottom-line-icon-image"
                  src="image-posts/Twitter_Views.png"
                  alt="Views Icon">
                </div>

                <div class="twitter-posts-bottom-line-number">
                  <p class="twitter-text">
                    <span class="twitter-icon-number">
                      421
                    </span>
                  </p>
                </div>
              </div>
            </div>
          
            <div class="twitter-posts-bottom-line-part2">
              <div class="twitter-posts-bottom-line-bookmark">
                <div class="twitter-posts-bottom-line-icon">
                  <img class="twitter-posts-bottom-line-icon-image"
                  src="image-posts/Twitter_Bookmark.png"
                  alt="Bookmark Icon">
                </div>
              </div>

              <div class="twitter-posts-bottom-line-share">
                <div class="twitter-posts-bottom-line-icon">
                  <img class="twitter-posts-bottom-line-icon-image"
                  src="image-posts/Twitter_Share.png"
                  alt="Share Icon">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
