 <!DOCTYPE html>
<html lang="en">
  
  <head>
    <title>
      Entry Point ryan at Twitter
    </title>
    <link
    rel="stylesheet"
    href="twitter-immitation.css">
  </head>

  <body>
    <div class="twitter-container">
      <!--Add post part-->
      <div class="twitter-add-post">
        <div class="twitter-add-post-left">
          <div class="twitter-div-pfp">
            <img class="twitter-pfp"
            src="image-posts/User-pfp.png"
            alt="User Profile Picture">
          </div>
        </div>

        <div class="twitter-add-post-right">
          <div class="twitter-add-post-right-top">
            <div class="searchbar">
              <input
              class="searchbar-input"
              type="text"
              placeholder="What's happening?">
            </div>
          </div>

          <div class="twitter-add-post-right-bottom">
            <div class="twitter-add-post-right-bottom-part1">
              <div class="twitter-add-post-right-bottom-media">
                <div class="twitter-add-post-right-bottom-icon">
                  <img class="twitter-add-post-right-bottom-icon-image"
                  src="image-posts/Twitter_Media.png"
                  alt="Media Icon">
                </div>
              </div>

              <div class="twitter-add-post-right-bottom-gif">
                <div class="twitter-add-post-right-bottom-icon">
                  <img class="twitter-add-post-right-bottom-icon-image"
                  src="image-posts/Twitter_GIF.png"
                  alt="GIF Icon">
                </div>
              </div>

              <div class="twitter-add-post-right-bottom-grok">
                <div class="twitter-add-post-right-bottom-icon">
                  <img class="twitter-add-post-right-bottom-icon-image"
                  src="image-posts/Twitter_Grok.png"
                  alt="Grok Icon">
                </div>  
              </div>
              
              <div class="twitter-add-post-right-bottom-poll">
                <div class="twitter-add-post-right-bottom-icon">
                  <img class="twitter-add-post-right-bottom-icon-image"
                  src="image-posts/Twitter_Poll.png"
                  alt="Poll Icon">
                </div>
              </div>

              <div class="twitter-add-post-right-bottom-emoji">
                <div class="twitter-add-post-right-bottom-icon">
                  <img class="twitter-add-post-right-bottom-icon-image"
                  src="image-posts/Twitter_Emoji.png"
                  alt="Emoji Icon">
                </div>
              </div>

              <div class="twitter-add-post-right-bottom-schedule">
                <div class="twitter-add-post-right-bottom-icon">
                  <img class="twitter-add-post-right-bottom-icon-image"
                  src="image-posts/Twitter_Schedule.png"
                  alt="Schedule Icon">
                </div>
              </div>

              <div class="twitter-add-post-right-bottom-location">
                <div class="twitter-add-post-right-bottom-icon">
                  <img class="twitter-add-post-right-bottom-icon-image"
                  src="image-posts/Twitter_Location.png"
                  alt="Location Icon">
                </div>
              </div>

              <div class="twitter-add-post-right-bottom-content-disclosure">
                <div class="twitter-add-post-right-bottom-icon">
                  <img class="twitter-add-post-right-bottom-icon-image"
                  src="image-posts/Twitter_Content_Disclosure.png"
                  alt="Content Disclosure Icon">
                </div>
              </div>
            </div>

            <div class="twitter-add-post-right-bottom-part2">
              <button class="twitter-post-button">
                Post
              </button>
            </div>
          </div>
        </div>
      </div>

      <!--Posts Part-->
      <div class="twitter-posts">
        <div class="twitter-posts-left">
          <div class="twitter-div-pfp">
            <img class="twitter-pfp"
            src="image-posts/ryan.png"
            alt="Ryan Ross Profile Picture">
          </div>
        </div>

        <div class="twitter-posts-right">
          <div class="twitter-posts-right-top">
            <div class="twitter-posts-right-top-line1">
              <div class="twitter-posts-right-top-line1-part1">
                <p class="twitter-text">
                  <span class="twitter-username">
                    Ryan
                  </span>

                  <span class="twitter-handle">
                    @ryanross
                  </span>

                  <span class="twitter-timestamp">
                    &middot; 1h
                  </span>
                </p>
              </div>

              <div class="twitter-posts-right-top-line1-part2">
                <div class="twitter-posts-right-top-line1-grok">
                  <div class="twitter-posts-right-top-line1-icon">
                    <img class="twitter-posts-right-top-line1-icon-image"
                    src="image-posts/Twitter_Grok.png"
                    alt="Grok Icon">
                  </div>
                </div>

                <div class="twitter-posts-right-top-line1-more">
                  <div class="twitter-posts-right-top-line1-icon">
                    <img class="twitter-posts-right-top-line1-icon-image"
                    src="image-posts/Twitter_More.png"
                    alt="More Icon">
                  </div>
                </div>
              </div>
            </div>

            <div class="twitter-posts-right-top-line2">
              <p class="twitter-text">
                <span class="twitter-content">
                  What the hell is a pineapple?
                </span>
              </p>
            </div>

            <div class="twitter-posts-right-top-line3">
              <img class="twitter-post-image"
                src="image-posts/Ryan-with-pinapple.png"
                alt="Pineapple Image">
            </div>
          </div>

          <div class="twitter-posts-right-bottom">
            <div class="twitter-posts-right-bottom-line">
              <div class="twitter-posts-right-bottom-line-part1">
                <div class="twitter-posts-right-bottom-line-comments">
                  <div class="twitter-posts-right-bottom-line-icon">
                    <img class="twitter-posts-right-bottom-line-icon-image"
                    src="image-posts/Twitter_Comment.png"
                    alt="Comment Icon">
                  </div>

                  <div class="twitter-posts-right-bottom-line-number">
                    <p class="twitter-text">
                      <span class="twitter-icon-number">
                        3
                      </span>
                    </p>
                  </div>
                </div>

                <div class="twitter-posts-right-bottom-line-repost">
                  <div class="twitter-posts-right-bottom-line-icon">
                    <img class="twitter-posts-right-bottom-line-icon-image"
                    src="image-posts/Twitter_Repost.png"
                    alt="Repost Icon">
                  </div>

                  <div class="twitter-posts-right-bottom-line-number">
                    <p class="twitter-text">
                      <span class="twitter-icon-number">
                        24
                      </span>
                    </p>
                  </div>                
                </div>

                <div class="twitter-posts-right-bottom-line-likes">
                  <div class="twitter-posts-right-bottom-line-icon">
                    <img class="twitter-posts-right-bottom-line-icon-image"
                    src="image-posts/Twitter_Like.png"
                    alt="Like Icon">
                  </div>

                  <div class="twitter-posts-right-bottom-line-number">
                    <p class="twitter-text">
                      <span class="twitter-icon-number">
                        114
                      </span>
                    </p>
                  </div>
                </div>

                <div class="twitter-posts-right-bottom-line-views">
                  <div class="twitter-posts-right-bottom-line-icon">
                    <img class="twitter-posts-right-bottom-line-icon-image"
                    src="image-posts/Twitter_Views.png"
                    alt="Views Icon">
                  </div>

                  <div class="twitter-posts-right-bottom-line-number">
                    <p class="twitter-text">
                      <span class="twitter-icon-number">
                        421
                      </span>
                    </p>
                  </div>
                </div>
              </div>
            
              <div class="twitter-posts-right-bottom-line-part2">
                <div class="twitter-posts-right-bottom-line-bookmark">
                  <div class="twitter-posts-right-bottom-line-icon">
                    <img class="twitter-posts-right-bottom-line-icon-image"
                    src="image-posts/Twitter_Bookmark.png"
                    alt="Bookmark Icon">
                  </div>
                </div>

                <div class="twitter-posts-right-bottom-line-share">
                  <div class="twitter-posts-right-bottom-line-icon">
                    <img class="twitter-posts-right-bottom-line-icon-image"
                    src="image-posts/Twitter_Share.png"
                    alt="Share Icon">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
