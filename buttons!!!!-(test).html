<style>
  .green-button {
    background-color: #009900;
    border: none;
    color: #000000;
    height: 50px;
    width: 200px;
    border-radius: 5px;
    cursor: pointer;
    font-size: large;
    margin-right: 10px;
    transition: box-shadow 0.1s;
  }

  .green-button:hover {
    background-color: #0a0a0a;
    color: #ffffff;
    box-shadow: 5px 5px 8px rgba(0, 0, 0, 0.2);
    transition: box-shadow 0.1s;
  }

  .green-button:active {
    background-color: #00ff00;
    color: #000000;
  }





  .gold-button {
    background-color: #e6b208;
    border: 2px solid #db7516;
    color: #000000;
    height: 50px;
    width: 200px;
    cursor: pointer;
    font-size: large;
    font-style: italic; 
    margin-right: 10px;
    transition: background-color 0.5s, color 0.5s;
  }

  .gold-button:hover {
    background-color: #a78500;
    color: #ffffff;
    transition: background-color 0.5s, color 0.5s;
  }

  .gold-button:active {
    background-color: #ffcc00;
    color: #000000;
  }



  .blue-button {
    background-color: #0099cc;
    border: 5px solid #006699;
    color: #003955;
    height: 50px;
    width: 150px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 25px;
    font-weight: bold;
    transition: opacity 0.3s;
    margin-right: 10px;
  }

  .blue-button:hover {
    opacity: 0.1;
    transition: opacity 0.3s;
  }

  .blue-button:active {
    background-color: #00ccff;
    color: #000000;
    transition: opacity 0.3s;
    opacity: 1;
  }




  .invis-button {
    background-color: transparent;
    border: none;
    color: transparent;
    height: 50px;
    width: 200px;
    cursor: pointer;
    font-size: large;
    border-radius: 15px;
    opacity: 0;
    transition: opacity 3s, color 3s;
  }

  .invis-button:hover {
    background-color: #000000;
    color: #ffffff;
    opacity: 0.1;
    transition: opacity 3s, color 3s;
  }

  .invis-button:active {
    background-color: #000000;
    color: #ffffff;
    opacity: 1;
    transition: opacity 3s, color 3s;
  }
</style>
